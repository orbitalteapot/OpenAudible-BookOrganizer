name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number to release and tag (e.g. 1.2.3)'
        required: true
        type: string
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Create tag (only when triggered manually) ─────────────────────────────────
  create-tag:
    name: Create release tag ${{ inputs.version }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version must be in X.Y.Z format (e.g. 1.2.3)"
            exit 1
          fi

      - name: Create and push tag
        run: |
          VERSION="${{ inputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" > /dev/null 2>&1; then
            echo "Error: tag ${VERSION} already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}" -m "Release ${VERSION}"
          git push origin "${VERSION}"

  # ── Resolve version (single source of truth for all build jobs) ──────────────
  resolve-version:
    name: Resolve release version
    needs: [create-tag]
    if: |
      always() &&
      (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped') &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && github.actor != 'github-actions[bot]')
      )
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      major_minor: ${{ steps.version.outputs.major_minor }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: release tag must be in X.Y.Z format (for example 1.2.3)"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major_minor=${VERSION%.*}" >> $GITHUB_OUTPUT
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

  # ── Windows x64 NSIS installer ───────────────────────────────────────────────
  build-windows:
    name: Windows x64 installer
    needs: [resolve-version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set app version from tag
        shell: bash
        run: |
          cd electron-ui
          npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install npm dependencies
        working-directory: electron-ui
        run: npm ci

      - name: Build Windows installer
        working-directory: electron-ui
        run: npm run dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: electron-ui/release/*.exe

  # ── Linux x64 installers (AppImage + deb) ───────────────────────────────────
  build-linux:
    name: Linux x64 installers
    needs: [resolve-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set app version from tag
        run: |
          cd electron-ui
          npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install npm dependencies
        working-directory: electron-ui
        run: npm ci

      - name: Build Linux installers
        working-directory: electron-ui
        run: |
          npm run publish:backend:linux
          npm run build
          npx electron-builder --publish never --linux AppImage deb --x64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-installers
          path: |
            electron-ui/release/*.AppImage
            electron-ui/release/*.deb

  # ── macOS x64 installer (dmg) ────────────────────────────────────────────────
  build-mac-x64:
    name: macOS x64 installer
    needs: [resolve-version]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set app version from tag
        run: |
          cd electron-ui
          npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install npm dependencies
        working-directory: electron-ui
        run: npm ci

      - name: Build macOS x64 installer
        working-directory: electron-ui
        env:
          # Skip code-signing for unsigned CI builds
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run publish:backend:mac
          npm run build
          npx electron-builder --publish never --mac dmg --x64

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-x64-installer
          path: electron-ui/release/*.dmg

  # ── macOS arm64 installer (dmg) ──────────────────────────────────────────────
  build-mac-arm64:
    name: macOS arm64 installer
    needs: [resolve-version]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set app version from tag
        run: |
          cd electron-ui
          npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install npm dependencies
        working-directory: electron-ui
        run: npm ci

      - name: Build macOS arm64 installer
        working-directory: electron-ui
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run publish:backend:mac-arm
          npm run build
          npx electron-builder --publish never --mac dmg --arm64

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-installer
          path: electron-ui/release/*.dmg

  # ── Docker image → ghcr.io ───────────────────────────────────────────────────
  build-docker:
    name: Docker image (WatcherService)
    needs: [resolve-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openaudible-book-watcher
          tags: |
            type=raw,value=${{ needs.resolve-version.outputs.version }}
            type=raw,value=${{ needs.resolve-version.outputs.major_minor }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: .
          file: WatcherService/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── GitHub Release with all artifacts ─────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs:
      - resolve-version
      - build-windows
      - build-linux
      - build-mac-x64
      - build-mac-arm64
      - build-docker
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: OpenAudible Book Organizer ${{ needs.resolve-version.outputs.version }}
          body_path: .github/release-body.md
          generate_release_notes: true
          files: |
            artifacts/windows-installer/*.exe
            artifacts/linux-installers/*.AppImage
            artifacts/linux-installers/*.deb
            artifacts/macos-x64-installer/*.dmg
            artifacts/macos-arm64-installer/*.dmg
