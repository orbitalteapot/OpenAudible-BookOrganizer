name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number to release (e.g. 1.2.3)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Create tag (only when triggered manually) ─────────────────────────────────
  create-tag:
    name: Create release tag v${{ inputs.version }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version must be in X.Y.Z format (e.g. 1.2.3)"
            exit 1
          fi

      - name: Create and push tag
        run: |
          VERSION="${{ inputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" > /dev/null 2>&1; then
            echo "Error: tag v${VERSION} already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

  # ── Resolve version (single source of truth for all build jobs) ──────────────
  resolve-version:
    name: Resolve release version
    needs: [create-tag]
    if: always() && (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      major_minor: ${{ steps.version.outputs.major_minor }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major_minor=${VERSION%.*}" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

  # ── Windows x64 NSIS installer ───────────────────────────────────────────────
  build-windows:
    name: Windows x64 installer
    needs: [resolve-version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set app version from tag
        shell: bash
        run: |
          cd electron-ui
          npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install npm dependencies
        working-directory: electron-ui
        run: npm ci

      - name: Build Windows installer
        working-directory: electron-ui
        run: npm run dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: electron-ui/release/*.exe

  # ── Linux x64 tar.gz ─────────────────────────────────────────────────────────
  build-linux:
    name: Linux x64 package
    needs: [resolve-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set app version from tag
        run: |
          cd electron-ui
          npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install npm dependencies
        working-directory: electron-ui
        run: npm ci

      - name: Build Linux package
        working-directory: electron-ui
        run: npm run dist:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: electron-ui/release/*.tar.gz

  # ── macOS x64 zip ────────────────────────────────────────────────────────────
  build-mac-x64:
    name: macOS x64 package
    needs: [resolve-version]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set app version from tag
        run: |
          cd electron-ui
          npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install npm dependencies
        working-directory: electron-ui
        run: npm ci

      - name: Build macOS x64 package
        working-directory: electron-ui
        env:
          # Skip code-signing for unsigned CI builds
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:mac-x64

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-package
          path: electron-ui/release/*.zip

  # ── macOS arm64 zip ───────────────────────────────────────────────────────────
  build-mac-arm64:
    name: macOS arm64 package
    needs: [resolve-version]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set app version from tag
        run: |
          cd electron-ui
          npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install npm dependencies
        working-directory: electron-ui
        run: npm ci

      - name: Build macOS arm64 package
        working-directory: electron-ui
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:mac-arm

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-package
          path: electron-ui/release/*.zip

  # ── Docker image → ghcr.io ───────────────────────────────────────────────────
  build-docker:
    name: Docker image (WatcherService)
    needs: [resolve-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openaudible-book-watcher
          tags: |
            type=raw,value=${{ needs.resolve-version.outputs.version }}
            type=raw,value=${{ needs.resolve-version.outputs.major_minor }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: WatcherService/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── GitHub Release with all artifacts ─────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs:
      - resolve-version
      - build-windows
      - build-linux
      - build-mac-x64
      - build-mac-arm64
      - build-docker
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/windows-installer/*.exe
            artifacts/linux-package/*.tar.gz
            artifacts/macos-x64-package/*.zip
            artifacts/macos-arm64-package/*.zip
